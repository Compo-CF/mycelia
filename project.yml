name: Mycelia
options:
  bundleIdPrefix: com.centricfiber
  deploymentTarget:
    iOS: "17.0"
  developmentLanguage: en
  createIntermediateGroups: true
settings:
  base:
    SWIFT_VERSION: "5.9"
    IPHONEOS_DEPLOYMENT_TARGET: "17.0"
    TARGETED_DEVICE_FAMILY: "1"
    ALWAYS_SEARCH_USER_PATHS: NO
    ENABLE_USER_SCRIPT_SANDBOXING: NO
    DEVELOPMENT_TEAM: "7H5T5AR2X5"
targets:
  Mycelia:
    type: application
    platform: iOS
    sources:
      - path: Mycelia
        excludes:
          - "**/.DS_Store"
          - "**/Info.plist"
          - "**/*.entitlements"
    info:
      path: Generated/Info.plist
      properties:
        CFBundleDisplayName: Mycelia
        CFBundleShortVersionString: "1.0.0"
        # Bump before each TestFlight upload (see scripts/bump-build.sh).
        CFBundleVersion: "1"
        UILaunchScreen:
          UIColorName: "LaunchBackground"
        UISupportedInterfaceOrientations:
          - UIInterfaceOrientationPortrait
        ITSAppUsesNonExemptEncryption: false
    settings:
      base:
        PRODUCT_NAME: Mycelia
        PRODUCT_BUNDLE_IDENTIFIER: com.centricfiber.mycelia
        CODE_SIGN_STYLE: Automatic
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        ASSETCATALOG_COMPILER_GLOBAL_ACCENT_COLOR_NAME: AccentColor
        GENERATE_INFOPLIST_FILE: NO
  MyceliaTests:
    type: bundle.unit-test
    platform: iOS
    sources:
      - MyceliaTests
    dependencies:
      - target: Mycelia
    settings:
      base:
        PRODUCT_NAME: MyceliaTests
